{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
    {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show shadow-sm mx-3" role="alert" style="font-size: 0.95rem;">
            {{ message|safe }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
        </div>
    {% endfor %}
{% endif %}
{% endwith %}

<!-- 🔵 Zona para mensajes AJAX (misma apariencia que los flash) -->
<div id="ajaxMessages"></div>
