<div class="row g-3">

    <div class="col-md-4">
        <a href="{{ url_for('carga_ficheros') }}" class="text-decoration-none text-dark">
            <div class="ratio ratio-1x1">
                <div class="card shadow-sm pointer w-100 h-100">
                    <div class="card-body d-flex flex-column justify-content-center align-items-center text-center">
                        <img src="{{ url_for('static', filename='img/upload.png') }}"
                             alt="Carga de ficheros"
                             style="width:64px;opacity:0.8;">
                        <h5 class="mt-3 mb-0">Carga de ficheros</h5>
                    </div>
                </div>
            </div>
        </a>
    </div>

    <div class="col-md-4">
        <a href="{{ url_for('consulta_contadores') }}" class="text-decoration-none text-dark">
            <div class="ratio ratio-1x1">
                <div class="card shadow-sm pointer w-100 h-100">
                    <div class="card-body d-flex flex-column justify-content-center align-items-center text-center">
                        <img src="{{ url_for('static', filename='img/counter.png') }}"
                             alt="Consulta de contadores"
                             style="width:64px;opacity:0.8;">
                        <h5 class="mt-3 mb-0">Consulta de contadores</h5>
                    </div>
                </div>
            </div>
        </a>
    </div>

    <div class="col-md-4">
        <a href="{{ url_for('valoracion_tareas') }}" class="text-decoration-none text-dark">
            <div class="ratio ratio-1x1">
                <div class="card shadow-sm pointer w-100 h-100">
                    <div class="card-body d-flex flex-column justify-content-center align-items-center text-center">
                        <img src="{{ url_for('static', filename='img/checklist.png') }}"
                             alt="Valoración de tareas"
                             style="width:64px;opacity:0.8;">
                        <h5 class="mt-3 mb-0">Valoración de tareas</h5>
                    </div>
                </div>
            </div>
        </a>
    </div>
</div>
